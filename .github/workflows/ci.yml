name: CI (PyTest + Ruff)

on:
  push:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff

      - name: Run Ruff
        id: ruff
        run: |
          ruff check . --output-format github > ruff.txt || true

      - name: Comment Ruff results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let output = "";
            try {
              output = fs.readFileSync("ruff.txt", "utf8");
            } catch (e) {
              output = "";
            }

            if (output.trim().length === 0) {
              console.log("No Ruff issues found — no comment needed.");
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚨 **Ruff found issues:**\n\n\`\`\`\n${output}\n\`\`\``
            });

      - name: Run Tests
        run: |
          pytest -q
          if [ $? -eq 5 ]; then
            echo "⚠️ No tests found"
            exit 0
          fi