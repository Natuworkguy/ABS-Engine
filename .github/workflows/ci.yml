name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff Lint
        run: |
          echo "Running Ruff static analysis..."
          ruff check .

  ci:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: CI Finalization
        run: |
          GREEN="\033[32m"
          CYAN="\033[36m"
          BOLD="\033[1m"
          RESET="\033[0m"

          echo -e "${BOLD}${CYAN}======================================${RESET}"
          echo -e "${CYAN}[CI] Pipeline Summary${RESET}"
          echo -e "${GREEN}[CI] Ruff static analysis: PASSED${RESET}"
          echo -e "${BOLD}${CYAN}======================================${RESET}"
          echo -e "${GREEN}[CI] All tests passed 🚀${RESET}"