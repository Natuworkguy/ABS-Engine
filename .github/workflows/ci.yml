name: CI (PyTest + Ruff)

on:
  push:
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff

      # 4. Run Ruff (linting)
      - name: Run Ruff Linter
        run: ruff check .

      # 5. Run PyTest
      - name: Run Tests
        run: pytest -q
