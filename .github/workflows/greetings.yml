name: Greetings

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Greet first-time contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Hey @${{ github.actor }}!

            Thanks for opening your first issue!  
            We'll take a look soon.

          pr-message: |
            Hi @${{ github.actor }}!

            Thanks for opening your first pull request!
            We appreciate your contribution and will review it as soon as possible.